<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NovaMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/animations.css">
    <style>
        /* Auth-specific styles */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(35, 18, 11, 0.88);
            border: 1px solid rgba(255, 221, 191, 0.15);
            border-radius: 20px;
            padding: 48px;
            backdrop-filter: blur(20px);
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .auth-logo span {
            color: var(--accent);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 221, 191, 0.08);
            border: 1px solid rgba(255, 221, 191, 0.15);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 176, 110, 0.12);
            box-shadow: 0 0 0 3px rgba(255, 176, 110, 0.15);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        .auth-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .forgot-link {
            color: var(--accent);
            transition: color 0.3s ease;
        }

        .forgot-link:hover {
            color: var(--accent-strong);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            border: none;
            border-radius: 10px;
            padding: 13px 24px;
            color: #1e1009;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 176, 110, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            inset: 50% 0;
            height: 1px;
            background: rgba(255, 221, 191, 0.15);
        }

        .divider-text {
            background: var(--surface);
            position: relative;
            padding: 0 12px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
        }

        .auth-footer-text {
            color: var(--muted);
        }

        .auth-footer-link {
            color: var(--accent);
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer-link:hover {
            color: var(--accent-strong);
        }

        .error-message {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #ffb6b6;
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(107, 255, 107, 0.15);
            border: 1px solid rgba(107, 255, 107, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #b6ffb6;
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 221, 191, 0.3);
            border-top-color: #1e1009;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .submit-btn.loading {
            pointer-events: none;
        }

        .submit-btn.loading::before {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-right: 6px;
            border: 2px solid rgba(30, 16, 9, 0.3);
            border-top-color: #1e1009;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @media (max-width: 600px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-title {
                font-size: 20px;
            }

            .auth-subtitle {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">Nova<span>Mind</span></div>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to your NovaMind study space and continue your learning journey.</p>
            </div>

            <form id="loginForm">
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="••••••••"
                        required
                    />
                </div>

                <div class="auth-actions">
                    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--muted); font-size: 13px;">
                        <input type="checkbox" style="cursor: pointer; accent-color: var(--accent);" />
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <div class="divider">
                <span class="divider-text">New to NovaMind?</span>
            </div>

            <div class="auth-footer">
                <span class="auth-footer-text">
                    Create your account to get started
                    <a href="/signup" class="auth-footer-link">Sign up here</a>
                </span>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showError(data.message || 'Login failed. Please try again.');
                }
            } catch (error) {
                showError('Network error. Please check your connection and try again.');
                console.error('Login error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = originalText;
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }
    </script>
</body>
</html>
