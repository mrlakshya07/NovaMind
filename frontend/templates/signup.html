<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — NovaMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/animations.css">
    <style>
        /* Auth-specific styles */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(35, 18, 11, 0.88);
            border: 1px solid rgba(255, 221, 191, 0.15);
            border-radius: 20px;
            padding: 48px;
            backdrop-filter: blur(20px);
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .auth-logo span {
            color: var(--accent);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 221, 191, 0.08);
            border: 1px solid rgba(255, 221, 191, 0.15);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 176, 110, 0.12);
            box-shadow: 0 0 0 3px rgba(255, 176, 110, 0.15);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 221, 191, 0.15);
            transition: all 0.3s ease;
        }

        .strength-bar.weak {
            background: #ff6b6b;
        }

        .strength-bar.medium {
            background: #ffd93d;
        }

        .strength-bar.strong {
            background: #6bcf7f;
        }

        .strength-text {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 24px 0;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .terms-checkbox input {
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .terms-checkbox label {
            cursor: pointer;
            flex: 1;
        }

        .terms-link {
            color: var(--accent);
            transition: color 0.3s ease;
        }

        .terms-link:hover {
            color: var(--accent-strong);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            border: none;
            border-radius: 10px;
            padding: 13px 24px;
            color: #1e1009;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 176, 110, 0.3);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            inset: 50% 0;
            height: 1px;
            background: rgba(255, 221, 191, 0.15);
        }

        .divider-text {
            background: var(--surface);
            position: relative;
            padding: 0 12px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
        }

        .auth-footer-text {
            color: var(--muted);
        }

        .auth-footer-link {
            color: var(--accent);
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer-link:hover {
            color: var(--accent-strong);
        }

        .error-message {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #ffb6b6;
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(107, 255, 107, 0.15);
            border: 1px solid rgba(107, 255, 107, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #b6ffb6;
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-title {
                font-size: 20px;
            }

            .auth-subtitle {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">Nova<span>Mind</span></div>
                <h1 class="auth-title">Start your journey</h1>
                <p class="auth-subtitle">Join NovaMind and transform the way you study with focused tools built for learners.</p>
            </div>

            <form id="signupForm">
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <div class="form-group">
                    <label class="form-label" for="username">Display Name</label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="Your name"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="••••••••"
                        required
                    />
                    <div class="password-strength" id="strengthBars">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <div class="strength-text" id="strengthText">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        class="form-input"
                        placeholder="••••••••"
                        required
                    />
                </div>

                <div class="terms-checkbox">
                    <input type="checkbox" id="terms" required />
                    <label for="terms">
                        I agree to NovaMind's
                        <a href="#" class="terms-link">Terms of Service</a>
                        and
                        <a href="#" class="terms-link">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="divider">
                <span class="divider-text">Already have an account?</span>
            </div>

            <div class="auth-footer">
                <span class="auth-footer-text">
                    Sign in to access your study space
                    <a href="/login" class="auth-footer-link">Sign in here</a>
                </span>
            </div>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthBars = document.querySelectorAll('.strength-bar');
        const strengthText = document.getElementById('strengthText');
        const submitBtn = signupForm.querySelector('button[type="submit"]');

        // Password strength indicator
        passwordInput.addEventListener('input', () => {
            const strength = calculatePasswordStrength(passwordInput.value);
            updateStrengthBars(strength);
            validatePasswordMatch();
        });

        confirmPasswordInput.addEventListener('input', validatePasswordMatch);

        function calculatePasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            return Math.min(strength, 3);
        }

        function updateStrengthBars(strength) {
            const levels = ['weak', 'medium', 'strong'];
            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    bar.classList.add(levels[strength - 1]);
                }
            });

            const strengthLevels = {
                0: 'Weak password',
                1: 'Fair password',
                2: 'Good password',
                3: 'Strong password'
            };
            strengthText.textContent = strengthLevels[strength] || 'Minimum 6 characters';
        }

        function validatePasswordMatch() {
            if (passwordInput.value && confirmPasswordInput.value) {
                if (passwordInput.value !== confirmPasswordInput.value) {
                    confirmPasswordInput.style.borderColor = 'rgba(255, 107, 107, 0.5)';
                } else {
                    confirmPasswordInput.style.borderColor = '';
                }
            }
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validation
            if (!username || !email || !password || !confirmPassword) {
                showError('Please fill in all fields.');
                return;
            }

            if (username.length < 2) {
                showError('Display name must be at least 2 characters.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            if (!terms) {
                showError('You must accept the Terms of Service and Privacy Policy.');
                return;
            }

            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Creating account...';

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Account created successfully! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showError(data.message || 'Signup failed. Please try again.');
                }
            } catch (error) {
                showError('Network error. Please check your connection and try again.');
                console.error('Signup error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }
    </script>
</body>
</html>
