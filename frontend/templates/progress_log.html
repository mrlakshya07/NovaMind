<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMind — Log Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link
        rel="stylesheet"
        href="/static/style.css"
    >
    <link
        rel="stylesheet"
        href="/static/animations.css"
    >
</head>
<body>
    <div class="cursor"></div>
    <nav>
        <div class="logo">Nova<span>Mind</span></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/notes">Notes</a>
            <a href="/tasks">Tasks</a>
            <a href="/pomodoro">Focus</a>
            <a href="/progress">Analytics</a>
        </div>
        <button class="nav-btn" onclick="location.href='/progress'">Workspace</button>
    </nav>
    <section class="session-layout reveal">

        <!-- LEFT -->

        <div class="session-left">

            <div class="section-header">

                <div>

                    <div class="hero-badge">
                        Study consistency tracker
                    </div>

                    <h2>
                        Log your study session
                    </h2>

                    <p>
                        Record focused study hours and track your
                        consistency over time.
                    </p>

                </div>

            </div>

            <div id="progress-log-message"
                class="message-card hidden">
            </div>

            <div class="panel form-panel session-form-card">

                <form id="progress-form"
                    class="form-grid">

                    <label>Date</label>

                    <input
                        type="date"
                        id="progress-date"
                        name="date"
                    />

                    <label>Hours Studied</label>

                    <input
                        type="number"
                        id="progress-hours"
                        name="hours"
                        min="0"
                        step="0.25"
                        placeholder="2.5"
                        required
                    />

                    <button
                        class="primary-btn"
                        type="submit"
                    >
                        Save Session
                    </button>

                </form>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="session-right">

            <!-- ANALYTICS -->

            <div class="panel insight-card">

                <p class="mini-label">
                    Today's Average Focus
                </p>

                <div id="focus-average"
                    class="focus-hours">
                    --
                </div>

                <p class="focus-text">
                    Your target today:
                    <span id="focus-target">
                        5h deep work
                    </span>
                </p>

            </div>

            <!-- PREVIOUS SESSIONS -->

            <div class="panel recent-card">

                <h3>
                    Previous Sessions
                </h3>

                <div id="recent-sessions">

                    <p class="empty-state">
                        Loading sessions...
                    </p>

                </div>

            </div>

            <div class="section-actions">

                <button
                    class="secondary-btn"
                    onclick="location.href='/progress'"
                >
                    View Analytics
                </button>

            </div>

        </div>

    </section>
    <script
        src="/static/main.js"
    ></script>
</body>
</html>
